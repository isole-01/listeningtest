<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Listening Style-Matching Test</title>

  <!-- jsPsych -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" />

  <!-- Plugins -->
  <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.2.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-slider-response@1.1.3"></script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: #fff;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 12px;
    }

    #root {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    audio {
      width: 100%;
      max-width: 100%;
    }

    .jspsych-display-element,
    .jspsych-content-wrapper {
      width: 100% !important;
      max-width: 100% !important;
      overflow-x: hidden !important;
    }

    .jspsych-content {
      width: 100% !important;
      max-width: 720px;
      margin: 0 auto;
      padding: 12px;
    }

    .jspsych-html-slider-response-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 100%;
    }

    .jspsych-slider {
      width: 100%;
      max-width: 360px;
    }

    .jspsych-html-slider-response-labels {
      width: 100%;
      max-width: 360px;
      display: flex;
      justify-content: space-between;
      gap: 0;
      font-size: 12px;
      line-height: 1.2;
    }

    .jspsych-html-slider-response-label {
      flex: 1 1 0;
      min-width: 0;
      white-space: normal;
    }

    .jspsych-html-slider-response-label:first-child {
      text-align: left;
      padding-right: 8px;
    }

    .jspsych-html-slider-response-label:last-child {
      text-align: right;
      padding-left: 8px;
    }

    button.jspsych-btn {
      padding: 12px 16px;
    }

    .small { opacity: 0.8; }
    .error { color: #b00020; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  </style>
</head>

<body>
  <div class="wrap" id="root"></div>

  <script>
    const STATIC_BASE = "/static";
    const MANIFEST_URL = `${STATIC_BASE}/audio/manifest.json`;
    const SUBMIT_URL = "/api/submit";

    const REQUIRE_FULL_LISTEN_BEFORE_CONTINUE = false;
    const REQUIRE_PLAY_AT_LEAST_ONCE = false;

    function assert(cond, msg) {
      if (!cond) throw new Error(msg);
    }

    function makeId() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return "p_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16);
    }

    const participant_id = (() => {
      const key = "listening_test_participant_id";
      const existing = localStorage.getItem(key);
      if (existing) return existing;
      const id = makeId();
      localStorage.setItem(key, id);
      return id;
    })();

    function showFatal(err) {
      const msg = err && err.message ? err.message : String(err);
      const root = document.getElementById("root");
      if (!root) return;

      root.innerHTML = `
        <div class="jspsych-content">
          <h2 class="error">Error</h2>
          <p class="error">${msg}</p>
          <p class="small">Check that <span class="mono">${MANIFEST_URL}</span> exists and is valid.</p>
        </div>
      `;
    }

    function showSubmitError(message, payload) {
      const root = document.getElementById("root");
      if (!root) return;

      const backupJson = JSON.stringify(payload, null, 2);
      const blob = new Blob([backupJson], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      root.innerHTML = `
        <div class="jspsych-content">
          <h2 class="error">Submission error</h2>
          <p class="error">${message}</p>
          <p>Download the backup JSON and send it to the researcher:</p>
          <p><a href="${url}" download="listening_test_backup.json">Download backup JSON</a></p>
          <p class="small">Session id: <span class="mono">${participant_id}</span></p>
        </div>
      `;
    }

    async function loadManifest() {
      const r = await fetch(MANIFEST_URL, { cache: "no-store" });
      if (!r.ok) {
        const text = await r.text().catch(() => "");
        throw new Error(`Failed to load manifest (${r.status}): ${text || "no response body"}`);
      }
      return await r.json();
    }

    function resolvePath(baseUrl, folder, file) {
      const cleanBase = baseUrl.replace(/\/$/, "");
      const cleanFolder = folder.replace(/^\/+/, "").replace(/\/+$/, "");
      return `${cleanBase}/${cleanFolder}/${file}`;
    }

    function submitPayload(payload) {
      return fetch(SUBMIT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      }).then(async (resp) => {
        if (!resp.ok) {
          const text = await resp.text().catch(() => "");
          throw new Error(`Submit failed (${resp.status}): ${text || "no response body"}`);
        }
        return await resp.json();
      });
    }

    (async function main() {
      let jsPsych = null;

      try {
        const manifest = await loadManifest();

        assert(typeof manifest.style_label === "string" && manifest.style_label.length > 0, "manifest.style_label missing");
        assert(typeof manifest.base_url === "string" && manifest.base_url.length > 0, "manifest.base_url missing");

        assert(manifest.reference && typeof manifest.reference === "object", "manifest.reference missing");
        assert(typeof manifest.reference.folder === "string" && manifest.reference.folder.length > 0, "manifest.reference.folder missing");
        assert(typeof manifest.reference.file === "string" && manifest.reference.file.length > 0, "manifest.reference.file missing");

        assert(Array.isArray(manifest.trials) && manifest.trials.length > 0, "manifest.trials must be non-empty");

        const reference_audio = resolvePath(
          manifest.base_url,
          manifest.reference.folder,
          manifest.reference.file
        );

        const chosenClips = manifest.trials.map((t, i) => {
          assert(typeof t.model === "string" && t.model.length > 0, `trial ${i}: model missing`);
          assert(Number.isInteger(t.step), `trial ${i}: step missing or not an integer`);
          assert(typeof t.folder === "string" && t.folder.length > 0, `trial ${i}: folder missing`);
          assert(typeof t.file === "string" && t.file.length > 0, `trial ${i}: file missing`);

          return {
            clip_id: `${t.model}::${t.step}::${t.file}::${i}`,
            model: t.model,
            step: t.step,
            url: resolvePath(manifest.base_url, t.folder, t.file),
            picked_file: t.file,
            picked_folder: t.folder,
          };
        });

        jsPsych = initJsPsych({
          display_element: document.getElementById("root"),
        });

        const randomized = jsPsych.randomization.shuffle(chosenClips);
        const allAudio = [reference_audio, ...randomized.map((c) => c.url)];

        const listenCountByClip = new Map();
        const timeline = [];

        timeline.push({
          type: jsPsychPreload,
          audio: allAudio,
          show_progress_bar: true,
          message: "<p>Loading audio…</p>",
        });

        timeline.push({
          type: jsPsychHtmlButtonResponse,
          stimulus: `
            <h2>Listening style-matching test</h2>
            <p>You will first hear a <strong>reference example</strong> of the target style: <strong>${manifest.style_label}</strong>.</p>
            <p>Then you will hear generated clips. For each one, rate <strong>how well it matches that style</strong>.</p>
            <p>Do <strong>not</strong> judge whether the clip sounds identical to the reference example. The reference is only there to illustrate the style.</p>
            <p class="small">Session id: <span class="mono">${participant_id}</span></p>
          `,
          choices: ["Continue"],
        });

        timeline.push({
          type: jsPsychHtmlButtonResponse,
          stimulus: `
            <h2>Target style: ${manifest.style_label}</h2>
            <p>This reference clip is provided as an <strong>example of the target style</strong>.</p>
            <audio controls preload="auto" src="${reference_audio}"></audio>
          `,
          choices: ["Start rating"],
        });

        randomized.forEach((c, idx) => {
          timeline.push({
            type: jsPsychHtmlSliderResponse,
            stimulus: `
              <p><strong>How well does this clip match the style "${manifest.style_label}"?</strong></p>
              <p class="small">Use the reference as an example of the style, not as something the clip should copy exactly.</p>
              <audio id="trial-audio" controls preload="auto" src="${c.url}"></audio>
              <p class="small">1 = doesn't match · 10 = matches very well</p>
            `,
            min: 1,
            max: 10,
            step: 1,
            slider_start: 5,
            require_movement: true,
            //labels: ["1", "10"],
            button_label: "Continue",
            data: {
              trial_tag: "rate_clip",
              participant_id,
              style_label: manifest.style_label,
              reference_audio,
              clip_id: c.clip_id,
              model: c.model,
              step: c.step,
              order_index: idx,
              picked_folder: c.picked_folder,
              picked_file: c.picked_file,
              clip_url: c.url,
            },
            on_load: () => {
              const audio = document.getElementById("trial-audio");
              if (!audio) {
                throw new Error("Missing trial audio element");
              }

              audio.addEventListener("play", () => {
                const prev = listenCountByClip.get(c.clip_id) || 0;
                listenCountByClip.set(c.clip_id, prev + 1);
              });

              const btn = document.getElementById("jspsych-html-slider-response-next");
              if (!btn) {
                throw new Error("Missing slider continue button");
              }

              if (REQUIRE_FULL_LISTEN_BEFORE_CONTINUE || REQUIRE_PLAY_AT_LEAST_ONCE) {
                btn.disabled = true;
              }

              let playedOnce = false;

              if (REQUIRE_PLAY_AT_LEAST_ONCE) {
                audio.addEventListener("play", () => {
                  playedOnce = true;
                  if (!REQUIRE_FULL_LISTEN_BEFORE_CONTINUE) {
                    btn.disabled = false;
                  }
                });
              }

              if (REQUIRE_FULL_LISTEN_BEFORE_CONTINUE) {
                audio.addEventListener("ended", () => {
                  if (!REQUIRE_PLAY_AT_LEAST_ONCE || playedOnce) {
                    btn.disabled = false;
                  }
                });
              }
            },
          });
        });

        timeline.push({
          type: jsPsychHtmlButtonResponse,
          stimulus: `
            <h2>Submit</h2>
            <p>Click submit to send your ratings.</p>
            <p class="small">If submission fails, a backup JSON download will appear.</p>
          `,
          choices: ["Submit"],
          on_finish: () => {
            const rows = jsPsych.data.get().filter({ trial_tag: "rate_clip" }).values();

            if (rows.length !== randomized.length) {
              throw new Error(`Expected ${randomized.length} rating trials, got ${rows.length}`);
            }

            const trials = rows.map((r) => ({
              clip_id: r.clip_id,
              model: r.model,
              step: r.step,
              rating: Number(r.response),
              order_index: r.order_index,
              rt_ms: Math.max(0, Math.floor(r.rt)),
              listen_count: listenCountByClip.get(r.clip_id) || 0,
              picked_folder: r.picked_folder,
              picked_file: r.picked_file,
            }));

            const payload = {
              participant_id,
              style_label: manifest.style_label,
              reference_audio,
              trials,
              meta: {
                manifest_url: MANIFEST_URL,
                user_agent: navigator.userAgent,
                submitted_at_local: new Date().toISOString(),
              },
            };

            submitPayload(payload)
              .then(() => {
                const root = document.getElementById("root");
                if (!root) {
                  throw new Error("Missing root element");
                }

                root.innerHTML = `
                  <div class="jspsych-content">
                    <h2>Submitted ✅</h2>
                    <p class="small">Thanks. You can close this tab.</p>
                  </div>
                `;
              })
              .catch((err) => {
                const msg = err && err.message ? err.message : String(err);
                showSubmitError(msg, payload);
              });
          },
        });

        jsPsych.run(timeline);
      } catch (err) {
        showFatal(err);
      }
    })();
  </script>
</body>
</html>
